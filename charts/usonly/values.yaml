replicaCount: 1

image:
  repository: oink12268/usonly
  tag: "67"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  host: usonly.duckdns.org
  tlsSecretName: usonly-tls

mysql:
  host: mysql
  port: 3306
  database: usonly
  username: root

gemini:
  secretName: gemini-secret
  secretKey: api-key

pinecone:
  secretName: pinecone-secret
  apiKeySecretKey: api-key
  indexHostSecretKey: index-host
  
javaOpts: "-Xms64m -Xmx256m -XX:MaxMetaspaceSize=150m -XX:+UseSerialGC"
